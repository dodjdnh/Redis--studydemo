spring:
  application:
    name: redisdemo # 应用程序名称，在微服务架构中用于服务发现
  
  data:
    redis:
      # Redis 服务器地址，本地开发通常为 localhost
      host: localhost 
      # Redis 端口，默认为 6379
      port: 59000      
      # 使用的数据库索引，默认是 0（Redis 默认有 16 个库，编号 0-15）
      database: 0     
      # Redis 密码从环境变量读取，避免把真实密码提交到 GitHub
      password: ${REDIS_PASSWORD:}
      
      # 进阶配置：连接池设置（推荐在生产环境配置）
      lettuce:
        pool:
          max-active: 8    # 连接池最大连接数
          max-idle: 8      # 连接池中的最大空闲连接
          min-idle: 0      # 连接池中的最小空闲连接
          max-wait: 100ms  # 连接池最大阻塞等待时间
